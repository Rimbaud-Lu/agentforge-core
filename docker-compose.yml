version: "3.9"

services:
  agentforge:
    build: .
    container_name: agentforge-app
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
    command: python -m agentforge_core.main --doctor

  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentforge-qdrant
    ports:
      - "6333:6333"
